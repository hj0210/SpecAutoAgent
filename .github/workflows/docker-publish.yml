# ─────────────────────────────────────────────
# SpecAutoAgent - GitHub Actions
# main 브랜치 push 시 자동으로 Docker Hub 업데이트
# ─────────────────────────────────────────────

name: Docker Build & Push

on:
  push:
    branches:
      - main

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: 코드 체크아웃
        uses: actions/checkout@v4

      - name: Docker Hub 로그인
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Docker 이미지 빌드 & 푸시
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            chj0210/spec-auto-agent:latest
            chj0210/spec-auto-agent:${{ github.sha }}
