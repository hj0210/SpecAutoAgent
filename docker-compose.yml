  #     POSTGRES_USER: specauto
  #     POSTGRES_PASSWORD: specauto1234
  #   ports:
  #     - "5432:5432"
  #   volumes:
  #     - pgvector-data:/var/lib/postgresql/data
  #   networks:
  #     - spec-auto-net
  #   healthcheck:
  #     test: ["CMD-SHELL", "pg_isready -U specauto -d specauto_rag"]
  #     interval: 10s
  #     timeout: 5s
  #     retries: 5

  # ── Phase 2: Spring Boot RAG 서비스 ────────
  # pgvector 주석 해제 후 함께 사용
  #
  # spec-auto-rag:
  #   build:
  #     context: ./spec-auto-rag
  #     dockerfile: Dockerfile
  #   container_name: spec-auto-rag
  #   ports:
  #     - "8001:8001"
  #   environment:
  #     SPRING_DATASOURCE_URL: jdbc:postgresql://pgvector:5432/specauto_rag
  #     SPRING_DATASOURCE_USERNAME: specauto
  #     SPRING_DATASOURCE_PASSWORD: specauto1234
  #     OPENAI_API_KEY: ${OPENAI_API_KEY}
  #   depends_on:
