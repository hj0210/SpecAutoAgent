# ─────────────────────────────────────────────
# SpecAutoAgent - Docker Compose
#
# Phase 1 (현재): FastAPI 단독 실행
# Phase 2 (예정): Spring Boot RAG + pgvector 추가
#
# 실행: docker-compose up --build
# 종료: docker-compose down
# ─────────────────────────────────────────────

services:

  # ── Phase 1: FastAPI AI Agent ──────────────
  spec-auto-agent:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: spec-auto-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # 생성된 규격서를 로컬에서도 확인 가능하도록 마운트
      - ./spec_auto_agent/output:/app/spec_auto_agent/output
    restart: unless-stopped
    networks:
      - spec-auto-net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Phase 2: pgvector DB (RAG용) ───────────
  # Spring Boot RAG 모듈 연동 시 주석 해제
