# ─────────────────────────────────────────────
# SpecAutoAgent - 배포용 Docker Compose
# 빌드 없이 Docker Hub 이미지를 바로 pull해서 실행
#
# 사전 준비: .env 파일 생성 후 OPENAI_API_KEY 입력
# 실행: docker-compose -f docker-compose.prod.yml up -d
# 종료: docker-compose -f docker-compose.prod.yml down
#
# ※ Watchtower가 Docker Hub 새 이미지 감지 시 자동 재배포 (5분 간격)
# ─────────────────────────────────────────────

services:

  spec-auto-agent:
    image: chj0210/spec-auto-agent:latest   # Docker Hub에서 자동 pull
    container_name: spec-auto-agent
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./spec_auto_agent/output:/app/spec_auto_agent/output
      - ./spec_auto_agent/vector_db:/app/spec_auto_agent/vector_db
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Watchtower: Docker Hub 새 이미지 감지 → 자동 재시작 ──
  # git push → GitHub Actions → Docker Hub → Watchtower → 자동 반영
  watchtower:
    image: containrrr/watchtower
    container_name: watchtower
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 spec-auto-agent   # 5분마다 spec-auto-agent 이미지 확인
    restart: unless-stopped
